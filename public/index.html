<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nathina Calculator Pro</title>
    <style>
      /* Gradient background */
      body {
        font-family: "Arial", sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      h1 {
        margin-top: 30px;
        font-size: 3em;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .calculator {
        background: #fff;
        color: #333;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3);
        width: 350px;
        max-width: 95%;
        margin-top: 20px;
      }

      input,
      select,
      button {
        width: 90%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 16px;
      }

      button {
        background: linear-gradient(90deg, #ff416c, #ff4b2b);
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        border: none;
        transition: all 0.3s ease;
      }

      button:hover {
        transform: scale(1.05);
      }

      #result {
        margin-top: 15px;
        font-size: 1.5em;
        font-weight: bold;
        text-align: center;
      }

      .history {
        margin-top: 20px;
        max-height: 150px;
        overflow-y: auto;
        padding: 10px;
        background: #f1f1f1;
        color: #333;
        border-radius: 10px;
      }

      .history h3 {
        margin: 0;
        font-size: 16px;
      }

      .history p {
        margin: 5px 0;
        font-size: 14px;
      }

      .theme-toggle {
        margin-top: 10px;
        cursor: pointer;
        background: #333;
        color: #fff;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
      }

      /* Dark theme */
      body.dark {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: #fff;
      }

      body.dark .calculator {
        background: #1e1e1e;
        color: #fff;
      }

      body.dark .history {
        background: #333;
        color: #fff;
      }

      body.dark input,
      body.dark select {
        background: #555;
        color: #fff;
        border: 1px solid #888;
      }

      body.dark button {
        background: linear-gradient(90deg, #ff4b2b, #ff416c);
      }
    </style>
  </head>
  <body>
    <h1>Nathina Calculator Pro</h1>

    <div class="calculator">
      <input type="number" id="num1" placeholder="Enter first number" />
      <input type="number" id="num2" placeholder="Enter second number" />

      <select id="operation">
        <option value="add">Add (+)</option>
        <option value="subtract">Subtract (-)</option>
        <option value="multiply">Multiply (×)</option>
        <option value="divide">Divide (÷)</option>
        <option value="power">Power (^)</option>
        <option value="modulus">Modulus (%)</option>
        <option value="sqrt">Square Root (√)</option>
        <option value="factorial">Factorial (!)</option>
        <option value="percentage">Percentage (%)</option>
      </select>

      <div>
        <button onclick="calculate()">Calculate</button>
        <button onclick="clearAll()" style="background: gray">Clear</button>
      </div>

      <h2 id="result"></h2>

      <div class="history" id="history">
        <h3>Calculation History:</h3>
      </div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">
      Toggle Dark/Light Theme
    </button>

    <script>
      const historyDiv = document.getElementById("history");

      // Load history from localStorage
      let calcHistory = JSON.parse(localStorage.getItem("calcHistory")) || [];
      calcHistory.forEach((entry) => addToHistory(entry));

      function calculate() {
        const num1 = parseFloat(document.getElementById("num1").value);
        const num2 = parseFloat(document.getElementById("num2").value);
        const operation = document.getElementById("operation").value;

        let result;

        switch (operation) {
          case "add":
            result = num1 + num2;
            break;
          case "subtract":
            result = num1 - num2;
            break;
          case "multiply":
            result = num1 * num2;
            break;
          case "divide":
            result = num2 !== 0 ? num1 / num2 : "Cannot divide by zero";
            break;
          case "power":
            result = Math.pow(num1, num2);
            break;
          case "modulus":
            result = num2 !== 0 ? num1 % num2 : "Cannot divide by zero";
            break;
          case "sqrt":
            result = num1 >= 0 ? Math.sqrt(num1) : "Invalid input";
            break;
          case "factorial":
            result = factorial(num1);
            break;
          case "percentage":
            result = (num1 / 100) * num2;
            break;
          default:
            result = "Invalid operation";
        }

        document.getElementById("result").innerText = "Result: " + result;

        const entry = { num1, num2, operation, result };
        calcHistory.push(entry);
        localStorage.setItem("calcHistory", JSON.stringify(calcHistory));
        addToHistory(entry);
      }

      function addToHistory(entry) {
        const p = document.createElement("p");
        const opSymbol = getSymbol(entry.operation);
        p.textContent =
          entry.operation === "sqrt"
            ? `√${entry.num1} = ${entry.result}`
            : entry.operation === "factorial"
              ? `${entry.num1}! = ${entry.result}`
              : entry.operation === "percentage"
                ? `${entry.num1}% of ${entry.num2} = ${entry.result}`
                : `${entry.num1} ${opSymbol} ${entry.num2} = ${entry.result}`;
        historyDiv.appendChild(p);
        historyDiv.scrollTop = historyDiv.scrollHeight;
      }

      function clearAll() {
        document.getElementById("num1").value = "";
        document.getElementById("num2").value = "";
        document.getElementById("result").innerText = "";
      }

      function getSymbol(op) {
        switch (op) {
          case "add":
            return "+";
          case "subtract":
            return "-";
          case "multiply":
            return "×";
          case "divide":
            return "÷";
          case "power":
            return "^";
          case "modulus":
            return "%";
          case "percentage":
            return "%";
          default:
            return "";
        }
      }

      function factorial(n) {
        if (n < 0) return "Invalid input";
        if (n === 0 || n === 1) return 1;
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        return res;
      }

      // Keyboard support
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") calculate();
      });

      // Dark/Light theme toggle
      function toggleTheme() {
        document.body.classList.toggle("dark");
      }
    </script>
  </body>
</html>
