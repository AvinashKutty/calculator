name: CI/CD Pipeline to EC2

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: avinashanand28/ci-cd-demo
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Run Tests
        run: |
          # Python
          pip install pytest
          pytest tests/
          # Node.js
          # npm install
          # npm test

  push-deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          pass: ${{ secrets.EC2_PASSWORD }}
          script: |
            docker pull $IMAGE_NAME:$IMAGE_TAG
            docker stop ci-cd-demo || true
            docker rm ci-cd-demo || true
            docker run -d --name ci-cd-demo -p 5000:5000 $IMAGE_NAME:$IMAGE_TAG
